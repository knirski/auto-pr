# Reusable workflow: auto-pr for any GitHub project.
# No package.json required — uses npx to fetch auto-pr from GitHub.
#
# Consumer workflow:
#   on:
#     push:
#       branches: [ai/**]
#   jobs:
#     auto-pr:
#       uses: knirski/auto-pr/.github/workflows/auto-pr-reusable.yml@main
#       if: github.event.repository.fork != true
#       secrets: inherit
#
# Prerequisites: APP_ID, APP_PRIVATE_KEY secrets; .github/PULL_REQUEST_TEMPLATE.md

name: Auto-PR (reusable)

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'llama3.1:8b' }}
      OLLAMA_URL: ${{ vars.OLLAMA_URL || 'http://localhost:11434/api/generate' }}
    steps:
      - name: Check prerequisites
        run: |
          if [ ! -f .github/PULL_REQUEST_TEMPLATE.md ]; then
            echo "::error::Missing .github/PULL_REQUEST_TEMPLATE.md. Run: npx auto-pr-init"
            echo "::error::See https://github.com/knirski/auto-pr#integration"
            exit 1
          fi
          if [ -z "${{ secrets.APP_ID }}" ] || [ -z "${{ secrets.APP_PRIVATE_KEY }}" ]; then
            echo "::error::Missing secrets APP_ID or APP_PRIVATE_KEY. Create a GitHub App and add secrets."
            echo "::error::See https://github.com/knirski/auto-pr/blob/main/docs/INTEGRATION.md"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.repository.default_branch }}"

      - name: Get commit log and changed files
        id: commits
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: npx -p github:knirski/auto-pr auto-pr-get-commits

      - name: Setup Ollama
        if: steps.commits.outputs.count != '1'
        uses: ai-action/setup-ollama@d53adfeb0c20dc103f2acb3ee3d47bbc955c2abc # v2

      - name: Pull model
        if: steps.commits.outputs.count != '1'
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Generate PR content
        id: generate
        env:
          COMMITS: ${{ steps.commits.outputs.commits }}
          FILES: ${{ steps.commits.outputs.files }}
        run: npx -p github:knirski/auto-pr auto-pr-generate-content

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bf559f85448f9380bcfa2899dbdc01eb5b37be3a # v3.0.0-beta.2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TITLE: ${{ steps.generate.outputs.title }}
          BODY_FILE: ${{ steps.generate.outputs.body_file }}
        run: npx -p github:knirski/auto-pr auto-pr-create-or-update-pr
