# Reusable workflow: auto-pr for any GitHub project.
# No package.json required — uses npx to fetch auto-pr from GitHub.
#
# Convention over configuration: all inputs have defaults. User workflow:
#   on:
#     push:
#       branches: [ai/**]
#   jobs:
#     auto-pr:
#       uses: knirski/auto-pr/.github/workflows/auto-pr-reusable.yml@<sha>  # pin to SHA
#       secrets: inherit
#
# Pin to SHA for reproducible runs. Update auto-pr.yml to the merge commit SHA
# after merging changes to this workflow.
# Prerequisites: APP_ID, APP_PRIVATE_KEY secrets; .github/PULL_REQUEST_TEMPLATE.md

name: Auto-PR (reusable)

on:
  workflow_call:
    inputs:
      ollama_model:
        required: false
        type: string
        default: "llama3.1:8b"
      ollama_url:
        required: false
        type: string
        default: "http://localhost:11434/api/generate"
      pr_template_path:
        required: false
        type: string
        default: ".github/PULL_REQUEST_TEMPLATE.md"
      auto_pr_how_to_test:
        required: false
        type: string
        default: "1. Run the relevant tests or checks.\n2. "

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      OLLAMA_MODEL: ${{ inputs.ollama_model }}
      OLLAMA_URL: ${{ inputs.ollama_url }}
      # In auto-pr repo: fetch branch code so PRs test their own prompt/logic. Else: main.
      AUTO_PR_PKG: ${{ github.repository == 'knirski/auto-pr' && format('github:knirski/auto-pr#{0}', github.ref_name) || 'github:knirski/auto-pr' }}
    steps:
      - name: Validate pr_template_path
        env:
          PR_TEMPLATE_PATH: ${{ inputs.pr_template_path }}
        run: |
          if [[ "$PR_TEMPLATE_PATH" == *".."* ]] || [[ "$PR_TEMPLATE_PATH" == /* ]] || [[ ! "$PR_TEMPLATE_PATH" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "::error::Invalid pr_template_path: must be a relative path without '..'"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Check prerequisites
        env:
          PR_TEMPLATE_PATH: ${{ inputs.pr_template_path }}
        run: |
          if [ ! -f "$PR_TEMPLATE_PATH" ]; then
            echo "::error::Missing $PR_TEMPLATE_PATH. Run: npx auto-pr-init"
            echo "::error::See https://github.com/knirski/auto-pr#integration"
            exit 1
          fi
          if [ -z "${{ secrets.APP_ID }}" ] || [ -z "${{ secrets.APP_PRIVATE_KEY }}" ]; then
            echo "::error::Missing secrets APP_ID or APP_PRIVATE_KEY. Create a GitHub App and add secrets."
            echo "::error::See https://github.com/knirski/auto-pr/blob/main/docs/INTEGRATION.md"
            exit 1
          fi

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.repository.default_branch }}"

      - name: Get commit log and changed files
        id: commits
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: npx -p "$AUTO_PR_PKG" auto-pr-get-commits

      - name: Setup Ollama
        if: steps.commits.outputs.count != '1'
        uses: ai-action/setup-ollama@71ea83e32be8721c648fa946c5da9853679a3803 # v2

      - name: Pull model
        if: steps.commits.outputs.count != '1'
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Generate PR content
        id: generate
        env:
          COMMITS: ${{ steps.commits.outputs.commits }}
          FILES: ${{ steps.commits.outputs.files }}
          PR_TEMPLATE_PATH: ${{ inputs.pr_template_path }}
          AUTO_PR_HOW_TO_TEST: ${{ inputs.auto_pr_how_to_test }}
        run: npx -p "$AUTO_PR_PKG" auto-pr-generate-content

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TITLE: ${{ steps.generate.outputs.title }}
          BODY_FILE: ${{ steps.generate.outputs.body_file }}
        run: npx -p "$AUTO_PR_PKG" auto-pr-create-or-update-pr
