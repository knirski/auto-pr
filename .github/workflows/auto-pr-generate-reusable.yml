# Reusable workflow: generate PR content only (unprivileged).
# Checkout of branch (untrusted) with contents: read only. No secrets.
# Satisfies CodeQL "untrusted checkout in trusted context" — no privileged context.
#
# Call with create workflow: generate job → create job (needs: generate).
# See auto-pr.yml for the pattern.

name: Auto-PR generate (reusable)

on:
  workflow_call:
    outputs:
      auto_pr_pkg:
        description: "Package spec for npx (e.g. github:knirski/auto-pr#branch)"
        value: ${{ jobs.generate.outputs.auto_pr_pkg }}
    inputs:
      ollama_model:
        required: false
        type: string
        default: "llama3.1:8b"
      ollama_url:
        required: false
        type: string
        default: "http://localhost:11434/api/generate"
      pr_template_path:
        required: false
        type: string
        default: ".github/PULL_REQUEST_TEMPLATE.md"
      auto_pr_how_to_test:
        required: false
        type: string
        default: "1. Run the relevant tests or checks.\n2. "

permissions:
  contents: read

jobs:
  generate:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    outputs:
      auto_pr_pkg: ${{ steps.auto-pr-pkg.outputs.value }}
    steps:
      - name: Validate pr_template_path
        env:
          PR_TEMPLATE_PATH: ${{ inputs.pr_template_path }}
        run: |
          if [[ "$PR_TEMPLATE_PATH" == *".."* ]] || [[ "$PR_TEMPLATE_PATH" == /* ]] || [[ ! "$PR_TEMPLATE_PATH" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "::error::Invalid pr_template_path: must be a relative path without '..'"
            exit 1
          fi

      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Check prerequisites (template only)
        env:
          PR_TEMPLATE_PATH: ${{ inputs.pr_template_path }}
        run: |
          if [ ! -f "$PR_TEMPLATE_PATH" ]; then
            echo "::error::Missing $PR_TEMPLATE_PATH. Run: npx auto-pr-init"
            echo "::error::See https://github.com/knirski/auto-pr#integration"
            exit 1
          fi

      # setup-runtime: use full path so callers don't need the action. Relative ./ would
      # resolve to caller's repo. Update @SHA when updating workflow refs (see auto-pr.yml).
      - name: Setup runtime (Node or alternative) with cache
        id: setup
        uses: knirski/auto-pr/.github/actions/setup-runtime@3265c8d569b19900f1921fc24fdffa12a4d518bb

      - name: Fetch base branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: git fetch origin "$DEFAULT_BRANCH"

      - name: Set auto-pr package ref
        id: auto-pr-pkg
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: bash scripts/auto-pr-set-pkg.sh

      - name: Install dependencies (workspace only)
        if: steps.auto-pr-pkg.outputs.use_workspace == 'true'
        run: bun install --frozen-lockfile

      - name: Get commit log and changed files
        id: commits
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          AUTO_PR_PKG: ${{ steps.auto-pr-pkg.outputs.value }}
          RUNNER: ${{ steps.setup.outputs.runner }}
          USE_WORKSPACE: ${{ steps.auto-pr-pkg.outputs.use_workspace }}
        run: bash scripts/auto-pr-run-command.sh get-commits

      - name: Setup Ollama
        if: steps.commits.outputs.count != '1'
        uses: ai-action/setup-ollama@71ea83e32be8721c648fa946c5da9853679a3803 # v2

      - name: Pull model
        if: steps.commits.outputs.count != '1'
        env:
          OLLAMA_MODEL: ${{ inputs.ollama_model }}
        run: |
          if [[ ! "$OLLAMA_MODEL" =~ ^[a-zA-Z0-9._:-]+$ ]]; then
            echo "::error::Invalid ollama_model: must match ^[a-zA-Z0-9._:-]+$"
            exit 1
          fi
          ollama pull "$OLLAMA_MODEL"

      - name: Generate PR content
        id: generate
        env:
          COMMITS: ${{ steps.commits.outputs.commits }}
          FILES: ${{ steps.commits.outputs.files }}
          PR_TEMPLATE_PATH: ${{ inputs.pr_template_path }}
          AUTO_PR_HOW_TO_TEST: ${{ inputs.auto_pr_how_to_test }}
          OLLAMA_MODEL: ${{ inputs.ollama_model }}
          OLLAMA_URL: ${{ inputs.ollama_url }}
          AUTO_PR_PKG: ${{ steps.auto-pr-pkg.outputs.value }}
          RUNNER: ${{ steps.setup.outputs.runner }}
          USE_WORKSPACE: ${{ steps.auto-pr-pkg.outputs.use_workspace }}
        run: bash scripts/auto-pr-run-command.sh generate-content

      - name: Prepare artifact
        env:
          TITLE: ${{ steps.generate.outputs.title }}
          BODY_FILE: ${{ steps.generate.outputs.body_file }}
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          mkdir -p pr-content
          echo -n "$TITLE" > pr-content/title.txt
          cp "$BODY_FILE" pr-content/body.md
          echo -n "$BRANCH" > pr-content/branch.txt
          echo -n "$DEFAULT_BRANCH" > pr-content/default_branch.txt

      - name: Upload PR content
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pr-content
          path: pr-content/
