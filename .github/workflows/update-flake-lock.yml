# Periodically updates flake.lock and opens a PR.
# See: https://github.com/DeterminateSystems/update-flake-lock

name: Update flake.lock

concurrency:
  group: update-flake-lock
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at 00:00 UTC

permissions: {}

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: cachix/install-nix-action@6004951b182f8860210c8d6f0d808ec5b1a33d28 # v25
        with:
          extra_nix_config: "experimental-features = nix-command flakes auto-allocate-uids"

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/package-lock.json', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          pr-title: "chore(nix): update flake.lock"
          pr-labels: "dependencies,nix,automated"
          commit-msg: "chore(nix): update flake.lock"
