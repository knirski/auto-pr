# Copy this file to your repo as .github/workflows/auto-pr.yml
# Requires: APP_ID, APP_PRIVATE_KEY secrets
# Optional: .nvmrc or use node-version: '24' instead of node-version-file

name: Auto-PR

on:
  push:
    branches:
      - 'ai/**'

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    if: github.event.repository.fork != true
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      OLLAMA_MODEL: llama3.1:8b
      OLLAMA_URL: http://localhost:11434/api/generate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci

      - name: Check (test, lint, typecheck)
        run: npm run check:code

      - name: Markdown lint
        uses: rvben/rumdl@8c1798b13cf961c88a4c5d1136448f4f4391383d # v0.1.47

      - name: Spell check
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d # v1.44.0

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.repository.default_branch }}"

      - name: Get commit log and changed files
        id: commits
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: npx auto-pr-get-commits

      - name: Setup Ollama
        if: steps.commits.outputs.count != '1'
        uses: ai-action/setup-ollama@71ea83e32be8721c648fa946c5da9853679a3803 # v2

      - name: Pull model
        if: steps.commits.outputs.count != '1'
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Generate PR content
        id: generate
        env:
          COMMITS: ${{ steps.commits.outputs.commits }}
          FILES: ${{ steps.commits.outputs.files }}
          PR_TEMPLATE_PATH: .github/PULL_REQUEST_TEMPLATE.md
          AUTO_PR_HOW_TO_TEST: "1. Run `npm run check`\n2. "
        run: npx auto-pr-generate-content

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TITLE: ${{ steps.generate.outputs.title }}
          BODY_FILE: ${{ steps.generate.outputs.body_file }}
        run: npx auto-pr-create-or-update-pr
