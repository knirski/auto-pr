# Reusable workflow: Nix build with npmDepsHash auto-update.
# Called by ci-nix.yml and update-nix-hash.yml.
#
# Uses GitHub App token when push_allowed so the push triggers CI on the new commit
# (GITHUB_TOKEN pushes do not trigger workflows). Same App as auto-pr (APP_ID, APP_PRIVATE_KEY).

name: Nix

on:
  workflow_call:
    inputs:
      ref:
        description: "Checkout ref (PR head for ci, omit for default)"
        required: false
        type: string
        default: ""
      push_allowed:
        description: "Whether to commit and push npmDepsHash updates (false for fork PRs)"
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  nix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Push uses App token; job needs contents: write for git push (exit 128 fix)
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        if: inputs.push_allowed
        id: app-token
        uses: actions/create-github-app-token@bf559f85448f9380bcfa2899dbdc01eb5b37be3a # v3.0.0-beta.2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ inputs.push_allowed && steps.app-token.outputs.token || github.token }}

      - uses: cachix/install-nix-action@6004951b182f8860210c8d6f0d808ec5b1a33d28 # v25
        with:
          extra_nix_config: "experimental-features = nix-command flakes"

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12
        with:
          check-outdated: false

      - id: hash
        shell: bash
        run: |
          output=$(./scripts/update-npm-deps-hash.sh)
          if [ -n "$output" ]; then
            echo "$output" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.hash.outputs.hash != '' && inputs.push_allowed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add default.nix
          git commit -m "fix(nix): update npmDepsHash for package-lock.json"
          if ! git push; then
            echo "::error::git push failed (exit 128 often = permission denied; check App has Contents: Read and write)"
            exit 1
          fi

      - name: Trigger check on new commit
        if: steps.hash.outputs.hash != '' && inputs.push_allowed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REF: ${{ inputs.ref || github.ref }}
        run: |
          # gh expects branch name; strip refs/heads/ if present
          BRANCH="${REF#refs/heads/}"
          if ! gh workflow run ci.yml --ref "$BRANCH"; then
            echo "::error::Failed to trigger ci.yml. Ensure App has Actions: Read and write permission."
            exit 1
          fi

      - if: steps.hash.outputs.hash != '' && !inputs.push_allowed
        shell: bash
        run: |
          echo "::error::npmDepsHash mismatch. CI cannot push to fork PRs."
          echo ""
          echo "Update locally and commit:"
          echo "  nix run .#update-npm-deps-hash"
          echo "  # or: npm run update-nix-hash -- ${{ steps.hash.outputs.hash }}"
          echo "  git add default.nix && git commit -m 'fix(nix): update npmDepsHash for package-lock.json'"
          exit 1

      - run: nix build .#default
