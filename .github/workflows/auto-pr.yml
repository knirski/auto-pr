# Auto-PR — uses two reusable workflows (generate + create). Push to ai/* to auto-create a PR.
# No package.json required. Run: npx auto-pr-init (creates this file, template, .nvmrc)
#
# Two workflows: generate (unprivileged, checkout branch) + create (privileged, checkout default).
# Satisfies CodeQL "untrusted checkout in trusted context" — no suppression.
#
# Pin to SHA: reproducible runs, immutable supply chain. Update pinned SHA after
# merging changes to the reusable workflows.
#
# Runs on forks too: add APP_ID/APP_PRIVATE_KEY to your fork to test; else fails with clear message.

name: Auto-PR

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - "ai/**"

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    uses: knirski/auto-pr/.github/workflows/auto-pr-generate-reusable.yml@c8f8f5950558972106f07c28eff824e3bf316138

  create:
    needs: generate
    uses: knirski/auto-pr/.github/workflows/auto-pr-create-reusable.yml@c8f8f5950558972106f07c28eff824e3bf316138
    secrets: inherit
