# Auto-PR — uses the reusable workflow. Push to ai/* to auto-create a PR.
# No package.json required. Run: npx auto-pr-init (creates this file, template, .nvmrc)
#
# Pin to SHA: reproducible runs, immutable supply chain. In this repo, use current
# commit so PRs can test workflow changes; elsewhere use pinned SHA. Update pinned
# SHA after merging changes to the reusable workflow.
#
# Runs on forks too: add APP_ID/APP_PRIVATE_KEY to your fork to test; else fails with clear message.

name: Auto-PR

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - "ai/**"

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-pr:
    uses: knirski/auto-pr/.github/workflows/auto-pr-reusable.yml@${{ github.repository == 'knirski/auto-pr' && github.sha || '1e991ad63a5e72d0acc3b44f8dca8f41dde69e62' }}
    secrets: inherit
