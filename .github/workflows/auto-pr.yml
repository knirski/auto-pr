# Auto-PR — uses two reusable workflows (generate + create). Push to ai/* to auto-create a PR.
# No package.json required. Run: npx auto-pr-init (creates this file, template, .nvmrc)
#
# Two workflows: generate (unprivileged, checkout branch) + create (privileged, checkout default).
# Satisfies CodeQL "untrusted checkout in trusted context" — no suppression.
#
# Runs on forks too: add APP_ID/APP_PRIVATE_KEY to your fork to test; else fails with clear message.
#
# Update both @SHA refs below when:
# - After merging changes to auto-pr-generate-reusable.yml, auto-pr-create-reusable.yml,
#   or .github/actions/setup-runtime
# - When testing workflow changes on a branch: set to current commit (git rev-parse HEAD)
# - After merge: set to the merge commit SHA on main

name: Auto-PR

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - "ai/**"

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    if: github.ref_name != github.event.repository.default_branch
    uses: knirski/auto-pr/.github/workflows/auto-pr-generate-reusable.yml@57b7c955d1cc898e119fcef8b2d3d9a1085713a2

  create:
    needs: generate
    uses: knirski/auto-pr/.github/workflows/auto-pr-create-reusable.yml@57b7c955d1cc898e119fcef8b2d3d9a1085713a2
    with:
      auto_pr_pkg: ${{ needs.generate.outputs.auto_pr_pkg }}
    secrets: inherit
