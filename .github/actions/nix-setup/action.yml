# Composite action: checkout, install Nix.
# Reused by ci (nix job), update-nix-hash, update-flake-lock.
#
# Inputs:
#   ref: Checkout ref (e.g. PR head for ci). Omit for default.
#   fetch-depth: Git fetch depth. Default 0 (full history).
#   token: Checkout token (e.g. App token for push). Omit for GITHUB_TOKEN.

name: "Nix setup"
description: "Checkout repo, install Nix"

inputs:
  ref:
    description: "Checkout ref (e.g. PR head for ci). Omit for default."
    required: false
    default: ""
  fetch-depth:
    description: "Git fetch depth (0 = full history)"
    required: false
    default: "0"
  token:
    description: "Checkout token (e.g. App token for push). Omit for GITHUB_TOKEN."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        ref: ${{ inputs.ref || github.ref }}
        token: ${{ inputs.token || github.token }}

    - uses: cachix/install-nix-action@6004951b182f8860210c8d6f0d808ec5b1a33d28 # v25
      with:
        extra_nix_config: "experimental-features = nix-command flakes"
