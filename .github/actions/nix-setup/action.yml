# Composite action: install Nix.
# Reused by nix.yml, update-flake-lock.
# Checkout must run before this (workflow owns checkout; local actions need repo first).

name: "Nix setup"
description: "Install Nix with flakes"

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@6004951b182f8860210c8d6f0d808ec5b1a33d28 # v25
      with:
        extra_nix_config: "experimental-features = nix-command flakes"
