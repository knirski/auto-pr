logLevel = "warn"

[install]
exact = true

[test]
coverage = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coveragePathIgnorePatterns = ["test/**"]
coverageSkipTestFiles = true
# Bun enforces per-file. Overall 91.55% funcs; lowest file create-or-update-pr 68%.
# Set to 0.68 so CI passes; raise when low-coverage files get more tests.
coverageThreshold = 0.68
concurrentTestGlob = "test/**/*.test.ts"
preload = ["./test/test-setup.ts"]
smol = true
timeout = 15000

[test.reporter]
junit = "test-report.junit.xml"
